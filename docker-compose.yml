version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: docflow_db
    environment:
      POSTGRES_USER: docflow
      POSTGRES_PASSWORD: docflow
      POSTGRES_DB: docflow
    ports:
      - "5432:5432"
    volumes:
      - docflow_pgdata:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  docflow_pgdata:
